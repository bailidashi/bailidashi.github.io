<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏｜玩两把</title>
    <!-- 简单的游戏样式，你可以随时根据自己的喜好修改哦 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #1a2a32;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, monospace;
        }

        .game-container {
            background: #0f1920;
            padding: 20px 25px 25px 25px;
            border-radius: 42px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4);
        }

        canvas {
            background-color: #1e2f3a;
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: inset 0 0 0 2px #2e4a5c, 0 8px 18px rgba(0,0,0,0.3);
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 18px;
            background: #071016;
            padding: 12px 24px;
            border-radius: 60px;
            gap: 24px;
            flex-wrap: wrap;
        }

        .score-box {
            background: #00000066;
            padding: 5px 16px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }

        .score-box span {
            color: #b9e6ff;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .score-box .score-value {
            color: #facc15;
            font-size: 28px;
            font-weight: bold;
            margin-left: 10px;
        }

        button {
            background: #facc15;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 6px 22px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            color: #1e2a32;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        button:hover {
            background: #ffdf5e;
            transform: scale(0.96);
            box-shadow: 0 1px 2px black;
        }

        .hint {
            color: #809aa8;
            font-size: 13px;
            background: #07101680;
            padding: 5px 14px;
            border-radius: 50px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- 画布尺寸 400x400，每个格子20x20 => 20x20 网格，很经典的贪吃蛇手感 -->
    <canvas id="snakeCanvas" width="400" height="400"></canvas>
    
    <div class="info-panel">
        <div class="score-box">
            <span>🍎 得分</span>
            <span class="score-value" id="scoreDisplay">0</span>
        </div>
        <button id="resetSnakeBtn">🐍 新的一局</button>
        <div class="hint">⬆️ ⬇️ ⬅️ ➡️</div>
    </div>
</div>

<script>
    // ----- 获取画布 -----
    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');

    // ----- 游戏配置 -----
    const GRID_SIZE = 20;      // 每个格子 20px
    const TILE_COUNT = 20;     // 400 / 20 = 20， 20x20 的网格世界
    
    // ----- 游戏状态变量 -----
    let snake = [];          // 蛇身坐标数组 [{x,y}]
    let food = { x: 12, y: 12 };
    let dx = 1, dy = 0;      // 初始向右移动
    let score = 0;
    let gameRunning = true;
    let gameLoopId = null;
    let speedMs = 130;        // 速度 (毫秒/帧)
    
    // ----- 辅助函数 -----
    function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    
    // 生成不在蛇身上的食物
    function generateValidFood() {
        const totalCells = TILE_COUNT * TILE_COUNT;
        if (snake.length >= totalCells) {
            // 胜利！全屏都是蛇，游戏获胜
            gameRunning = false;
            alert("🎉 不可思议！你竟然通关了！ 🎉");
            return null;
        }
        
        // 用set记录蛇占用的格子，提升效率 (O(n) 偶尔生成食物完全够用)
        const snakeSet = new Set(snake.map(segment => `${segment.x},${segment.y}`));
        let freeCells = [];
        for (let i = 0; i < TILE_COUNT; i++) {
            for (let j = 0; j < TILE_COUNT; j++) {
                if (!snakeSet.has(`${i},${j}`)) {
                    freeCells.push({ x: i, y: j });
                }
            }
        }
        if (freeCells.length === 0) return null;
        const randIndex = Math.floor(Math.random() * freeCells.length);
        return freeCells[randIndex];
    }
    
    // 重置游戏
    function resetGame() {
        // 初始蛇：三个格子，水平排列 (10,10) (9,10) (8,10)
        snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];
        dx = 1; dy = 0;   // 向右移动
        score = 0;
        gameRunning = true;
        document.getElementById('scoreDisplay').innerText = score;
        
        // 生成有效食物
        const newFood = generateValidFood();
        if (newFood) food = newFood;
        else food = { x: 15, y: 15 }; // fallback
        
        // 如果之前有定时器，清除并重启
        if (gameLoopId) clearInterval(gameLoopId);
        gameLoopId = setInterval(updateGame, speedMs);
        draw(); // 立刻重绘
    }
    
    // ----- 碰撞检测 (边界 + 自身) -----
    function checkCollision(headX, headY, snakeArr) {
        // 边界碰撞
        if (headX < 0 || headX >= TILE_COUNT || headY < 0 || headY >= TILE_COUNT) {
            return true;
        }
        // 自身碰撞 (注意新头部和原来的蛇身)
        for (let i = 0; i < snakeArr.length; i++) {
            if (snakeArr[i].x === headX && snakeArr[i].y === headY) {
                return true;
            }
        }
        return false;
    }
    
    // ----- 核心更新逻辑 (移动、吃食物、游戏结束) -----
    function updateGame() {
        if (!gameRunning) return;
        
        // 计算新蛇头
        const head = snake[0];
        const newHead = { x: head.x + dx, y: head.y + dy };
        
        // 检查是否会吃到食物
        const willEat = (newHead.x === food.x && newHead.y === food.y);
        
        // 构建临时新蛇 (先模拟移动, 用于碰撞检测)
        let newSnake;
        if (willEat) {
            // 吃到了 : 把新头加在最前面, 尾巴不删除
            newSnake = [newHead, ...snake];
        } else {
            // 没吃到: 新头 + 去掉尾巴
            newSnake = [newHead, ...snake.slice(0, -1)];
        }
        
        // 碰撞检测 (用 newSnake 检查自身碰撞时要注意: 刚加的新头是否碰到身体)
        const collision = checkCollision(newHead.x, newHead.y, newSnake.slice(1));
        if (collision) {
            gameRunning = false;
            if (gameLoopId) clearInterval(gameLoopId);
            gameLoopId = null;
            draw();  // 绘制游戏结束画面
            return;
        }
        
        // 无碰撞 → 更新真正的蛇
        snake = newSnake;
        
        // 处理吃食物逻辑
        if (willEat) {
            score++;
            document.getElementById('scoreDisplay').innerText = score;
            const newFood = generateValidFood();
            if (newFood) {
                food = newFood;
            } else {
                // 没有空闲格子了 → 玩家胜利！
                gameRunning = false;
                if (gameLoopId) clearInterval(gameLoopId);
                gameLoopId = null;
                alert("✨ 恭喜！你完成了贪吃蛇的终极挑战！ ✨");
                draw();
                return;
            }
        }
        
        // 重新绘制画面
        draw();
    }
    
    // ----- 绘图函数 (画蛇、食物、分数&结束蒙层) -----
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 绘制网格线 (浅色细线，看起来舒服)
        ctx.strokeStyle = '#2e4d5e';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= TILE_COUNT; i++) {
            ctx.beginPath();
            ctx.moveTo(i * GRID_SIZE, 0);
            ctx.lineTo(i * GRID_SIZE, canvas.height);
            ctx.stroke();
            ctx.moveTo(0, i * GRID_SIZE);
            ctx.lineTo(canvas.width, i * GRID_SIZE);
            ctx.stroke();
        }
        
        // 绘制食物 (小草莓风格)
        ctx.shadowBlur = 0;
        const fx = food.x * GRID_SIZE;
        const fy = food.y * GRID_SIZE;
        ctx.fillStyle = '#ff5252';
        ctx.beginPath();
        ctx.arc(fx + GRID_SIZE/2, fy + GRID_SIZE/2, GRID_SIZE/2 - 2, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#facc15';
        ctx.beginPath();
        ctx.arc(fx + GRID_SIZE/2, fy + GRID_SIZE/2, 3, 0, Math.PI*2);
        ctx.fill();
        
        // 绘制蛇身体 (渐变绿)
        for (let i = 0; i < snake.length; i++) {
            const seg = snake[i];
            const segX = seg.x * GRID_SIZE;
            const segY = seg.y * GRID_SIZE;
            const gradient = ctx.createLinearGradient(segX, segY, segX+GRID_SIZE, segY+GRID_SIZE);
            if (i === 0) {
                gradient.addColorStop(0, '#6fbf4c');
                gradient.addColorStop(1, '#4a9e2f');
            } else {
                gradient.addColorStop(0, '#58b13a');
                gradient.addColorStop(1, '#3d8726');
            }
            ctx.fillStyle = gradient;
            ctx.fillRect(segX + 1, segY + 1, GRID_SIZE - 2, GRID_SIZE - 2);
            // 蛇眼睛（头部）
            if (i === 0) {
                ctx.fillStyle = '#ffffff';
                const eyeOff = 4;
                ctx.beginPath();
                ctx.arc(segX + GRID_SIZE - 6, segY + 6, 2, 0, Math.PI*2);
                ctx.arc(segX + 6, segY + 6, 2, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(segX + GRID_SIZE - 6, segY + 5, 1, 0, Math.PI*2);
                ctx.arc(segX + 6, segY + 5, 1, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        // 游戏结束蒙层
        if (!gameRunning) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 20px "Segoe UI"';
            ctx.fillStyle = '#facc15';
            ctx.shadowBlur = 0;
            ctx.fillText('💀 GAME OVER 💀', canvas.width/2 - 95, canvas.height/2);
            ctx.font = '14px monospace';
            ctx.fillStyle = '#aad0e6';
            ctx.fillText('点击「新的一局」继续挑战', canvas.width/2 - 105, canvas.height/2 + 40);
        }
    }
    
    // ----- 键盘控制 -----
    function handleKeydown(e) {
        if (!gameRunning) return;
        const key = e.key;
        // 防止同时反向移动
        if ((key === 'ArrowUp' || key === 'w' || key === 'W') && dy !== 1) {
            dx = 0; dy = -1;
        } else if ((key === 'ArrowDown' || key === 's' || key === 'S') && dy !== -1) {
            dx = 0; dy = 1;
        } else if ((key === 'ArrowLeft' || key === 'a' || key === 'A') && dx !== 1) {
            dx = -1; dy = 0;
        } else if ((key === 'ArrowRight' || key === 'd' || key === 'D') && dx !== -1) {
            dx = 1; dy = 0;
        }
        e.preventDefault();
    }
    
    // ----- 页面启动 -----
    window.addEventListener('load', () => {
        resetGame();    // 初始化蛇和食物，开启定时器
        window.addEventListener('keydown', handleKeydown);
        const resetBtn = document.getElementById('resetSnakeBtn');
        if (resetBtn) {
            resetBtn.addEventListener('click', () => {
                if (gameLoopId) clearInterval(gameLoopId);
                resetGame();
            });
        }
    });
</script>
</body>
</html>
