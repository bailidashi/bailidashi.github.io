<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇｜手机/电脑</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0c10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', system-ui;
        }
        .game-container {
            background: #0f1920;
            padding: 20px;
            border-radius: 42px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4);
        }
        canvas {
            background-color: #1e2f3a;
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            width: 100%;
            height: auto;
            max-width: 400px;
            touch-action: none; /* 禁止触摸滚动 */
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            background: #071016;
            padding: 12px 24px;
            border-radius: 60px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .score-box {
            background: #00000066;
            padding: 5px 16px;
            border-radius: 60px;
            color: #facc15;
            font-weight: bold;
            font-size: 1.5rem;
        }
        button {
            background: #facc15;
            border: none;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-size: 1rem;
        }
        .direction-panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }
        .dir-btn {
            background: #2d3e4e;
            border: none;
            font-size: 28px;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            box-shadow: 0 2px 6px black;
            transition: 0.1s;
        }
        .dir-btn:active {
            transform: scale(0.95);
        }
        @media (max-width: 500px) {
            .dir-btn { font-size: 24px; padding: 6px 16px; }
            .score-box { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="snakeCanvas" width="400" height="400"></canvas>
        <div class="info-panel">
            <div class="score-box">🍎 <span id="scoreDisplay">0</span></div>
            <button id="resetSnakeBtn">🐍 新的一局</button>
        </div>
        <div class="direction-panel">
            <button class="dir-btn" id="btnUp">⬆️</button>
            <button class="dir-btn" id="btnLeft">⬅️</button>
            <button class="dir-btn" id="btnDown">⬇️</button>
            <button class="dir-btn" id="btnRight">➡️</button>
        </div>
        <p style="text-align:center; color:#809aa8; margin-top:10px; font-size:12px;">⬆️ ⬇️ ⬅️ ➡️ 或点击方向按钮</p>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const GRID_SIZE = 20;
        const TILE_COUNT = 20;

        let snake = [
            {x:10, y:10},
            {x:9, y:10},
            {x:8, y:10}
        ];
        let food = {x:15, y:10};
        let dx = 1, dy = 0;
        let score = 0;
        let gameRunning = true;
        let gameLoopId = null;
        let speedMs = 130;

        function randomInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

        function generateValidFood(){
            const snakeSet = new Set(snake.map(s=>`${s.x},${s.y}`));
            let free = [];
            for(let i=0;i<TILE_COUNT;i++){
                for(let j=0;j<TILE_COUNT;j++){
                    if(!snakeSet.has(`${i},${j}`)) free.push({x:i,y:j});
                }
            }
            if(free.length===0) return null;
            return free[Math.floor(Math.random()*free.length)];
        }

        function resetGame(){
            snake = [
                {x:10, y:10},
                {x:9, y:10},
                {x:8, y:10}
            ];
            dx = 1; dy = 0;
            score = 0;
            gameRunning = true;
            document.getElementById('scoreDisplay').innerText = score;
            let newFood = generateValidFood();
            if(newFood) food = newFood;
            else food = {x:15,y:15};
            if(gameLoopId) clearInterval(gameLoopId);
            gameLoopId = setInterval(updateGame, speedMs);
            draw();
        }

        function checkCollision(headX, headY, snakeArr){
            if(headX<0 || headX>=TILE_COUNT || headY<0 || headY>=TILE_COUNT) return true;
            for(let i=0;i<snakeArr.length;i++){
                if(snakeArr[i].x===headX && snakeArr[i].y===headY) return true;
            }
            return false;
        }

        function updateGame(){
            if(!gameRunning) return;
            const head = snake[0];
            const newHead = {x: head.x + dx, y: head.y + dy};
            const willEat = (newHead.x===food.x && newHead.y===food.y);
            let newSnake;
            if(willEat){
                newSnake = [newHead, ...snake];
            } else {
                newSnake = [newHead, ...snake.slice(0,-1)];
            }
            const collision = checkCollision(newHead.x, newHead.y, newSnake.slice(1));
            if(collision){
                gameRunning = false;
                if(gameLoopId) clearInterval(gameLoopId);
                gameLoopId = null;
                draw();
                return;
            }
            snake = newSnake;
            if(willEat){
                score++;
                document.getElementById('scoreDisplay').innerText = score;
                const newFood = generateValidFood();
                if(newFood) food = newFood;
                else {
                    gameRunning = false;
                    if(gameLoopId) clearInterval(gameLoopId);
                    gameLoopId = null;
                    draw();
                    alert("🎉 通关！");
                    return;
                }
            }
            draw();
        }

        function draw(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#2e4d5e';
            ctx.lineWidth = 0.5;
            for(let i=0;i<=TILE_COUNT;i++){
                ctx.beginPath();
                ctx.moveTo(i*GRID_SIZE,0);
                ctx.lineTo(i*GRID_SIZE,canvas.height);
                ctx.stroke();
                ctx.moveTo(0,i*GRID_SIZE);
                ctx.lineTo(canvas.width,i*GRID_SIZE);
                ctx.stroke();
            }
            // 食物
            ctx.fillStyle = '#ff5252';
            ctx.beginPath();
            ctx.arc(food.x*GRID_SIZE+GRID_SIZE/2, food.y*GRID_SIZE+GRID_SIZE/2, GRID_SIZE/2-2,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#facc15';
            ctx.beginPath();
            ctx.arc(food.x*GRID_SIZE+GRID_SIZE/2, food.y*GRID_SIZE+GRID_SIZE/2, 3,0,Math.PI*2);
            ctx.fill();
            // 蛇
            for(let i=0;i<snake.length;i++){
                const seg = snake[i];
                const x = seg.x*GRID_SIZE;
                const y = seg.y*GRID_SIZE;
                ctx.fillStyle = i===0 ? '#6fbf4c' : '#58b13a';
                ctx.fillRect(x+1,y+1,GRID_SIZE-2,GRID_SIZE-2);
                if(i===0){
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(x+GRID_SIZE-6, y+6, 2,0,Math.PI*2);
                    ctx.arc(x+6, y+6, 2,0,Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(x+GRID_SIZE-6, y+5, 1,0,Math.PI*2);
                    ctx.arc(x+6, y+5, 1,0,Math.PI*2);
                    ctx.fill();
                }
            }
            if(!gameRunning){
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.font = 'bold 20px "Segoe UI"';
                ctx.fillStyle = '#facc15';
                ctx.fillText('💀 GAME OVER', canvas.width/2-95, canvas.height/2);
                ctx.font = '14px monospace';
                ctx.fillStyle = '#aad0e6';
                ctx.fillText('点击「新的一局」', canvas.width/2-70, canvas.height/2+40);
            }
        }

        // 方向改变函数
        function setDirection(newDx, newDy){
            if(!gameRunning) return;
            // 禁止反向
            if((newDx === 1 && dx === -1) || (newDx === -1 && dx === 1)) return;
            if((newDy === 1 && dy === -1) || (newDy === -1 && dy === 1)) return;
            dx = newDx;
            dy = newDy;
        }

        // 键盘控制
        function handleKey(e){
            const key = e.key;
            if(key === 'ArrowUp' || key === 'w' || key === 'W') setDirection(0,-1);
            else if(key === 'ArrowDown' || key === 's' || key === 'S') setDirection(0,1);
            else if(key === 'ArrowLeft' || key === 'a' || key === 'A') setDirection(-1,0);
            else if(key === 'ArrowRight' || key === 'd' || key === 'D') setDirection(1,0);
            e.preventDefault();
        }

        window.addEventListener('load', () => {
            resetGame();
            window.addEventListener('keydown', handleKey);
            document.getElementById('resetSnakeBtn').addEventListener('click', resetGame);
            document.getElementById('btnUp').addEventListener('click', () => setDirection(0,-1));
            document.getElementById('btnDown').addEventListener('click', () => setDirection(0,1));
            document.getElementById('btnLeft').addEventListener('click', () => setDirection(-1,0));
            document.getElementById('btnRight').addEventListener('click', () => setDirection(1,0));
            // 防止触摸时页面滚动
            canvas.addEventListener('touchstart', (e) => e.preventDefault());
        });
    })();
</script>
</body>
</html>
