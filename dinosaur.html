<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>奔跑的哥哥｜手机小屏版</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #2b2e4a 0%, #1a1c2c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Segoe UI', monospace;
            margin: 0;
            padding: 12px;
        }
        .game-wrapper {
            background: #f7f7f0;
            border-radius: 28px;
            padding: 15px 18px 20px 18px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            width: 100%;
            height: auto;
            max-width: 400px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            gap: 12px;
            background: #e0dfcf;
            padding: 8px 16px;
            border-radius: 50px;
            flex-wrap: wrap;
        }
        .score-box {
            background: #2d2f36;
            padding: 4px 14px;
            border-radius: 40px;
            color: #ffd966;
            font-weight: bold;
            font-size: 1.2rem;
        }
        button {
            background: #3c5a6f;
            border: none;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .jump-btn {
            background: #f39c12;
            color: #1e2a32;
            font-size: 1rem;
            padding: 6px 20px;
        }
        .tip {
            color: #4e5b41;
            background: #d8d7c3;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
        }
        @media (max-width: 450px) {
            .game-wrapper { padding: 10px 12px; }
            .score-box { font-size: 1rem; }
            .jump-btn { font-size: 0.8rem; padding: 5px 16px; }
            .tip { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="400" height="100"></canvas>
        <div class="info-bar">
            <div class="score-box">🏆 <span id="scoreValue">0</span></div>
            <button id="restartDinoBtn">🐾 重来</button>
            <button id="jumpBtn" class="jump-btn">🦘 跳跃</button>
            <div class="tip">点击画布 / 跳跃按钮</div>
        </div>
    </div>
    <p style="text-align:center; margin-top:10px; color:#ccc; font-size:11px;">⭐ 主角是最爱的哥哥</p>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 替换成你的图片文件名
        const PLAYER_IMG_SRC = '哥哥.jpg';   // 修改为你自己的图片
        let playerImg = new Image();
        playerImg.src = PLAYER_IMG_SRC;
        let playerImgReady = false;
        playerImg.onload = () => { playerImgReady = true; };
        playerImg.onerror = () => { console.warn("图片加载失败，显示橙色方块"); };

        // 小屏版参数 (画布400x100)
        const GROUND_Y = 82;          // 地面高度
        const PLAYER_WIDTH = 18;
        const PLAYER_HEIGHT = 20;
        const PLAYER_X = 40;

        let yVelocity = 0;
        let playerY = GROUND_Y - PLAYER_HEIGHT;
        let isJumping = false;
        const GRAVITY = 0.6;
        const JUMP_POWER = -7;

        let obstacles = [];
        let frameCounter = 0;
        let baseSpawnGap = 110;
        let currentGap = 85;
        let score = 0;
        let gameOver = false;
        let animationId = null;
        let speed = 3.5;

        function updateScoreUI(){
            document.getElementById('scoreValue').innerText = Math.floor(score);
        }

        function spawnObstacle(){
            const obsType = Math.floor(Math.random() * 2);
            let width, height;
            if(obsType === 0){
                width = 7;
                height = 12;
            } else {
                width = 10;
                height = 16;
            }
            obstacles.push({
                x: canvas.width,
                y: GROUND_Y - height,
                width: width,
                height: height,
            });
        }

        function resetGame(){
            gameOver = false;
            score = 0;
            speed = 3.5;
            obstacles = [];
            frameCounter = 0;
            currentGap = baseSpawnGap;
            playerY = GROUND_Y - PLAYER_HEIGHT;
            yVelocity = 0;
            isJumping = false;
            updateScoreUI();
            setTimeout(() => {
                if(!gameOver) spawnObstacle();
            }, 500);
        }

        function checkCollision(playerRect, obs){
            return (playerRect.x < obs.x + obs.width &&
                    playerRect.x + playerRect.width > obs.x &&
                    playerRect.y < obs.y + obs.height &&
                    playerRect.y + playerRect.height > obs.y);
        }

        function updateGame(){
            if(gameOver) return;
            if(isJumping){
                yVelocity += GRAVITY;
                playerY += yVelocity;
                if(playerY >= GROUND_Y - PLAYER_HEIGHT){
                    playerY = GROUND_Y - PLAYER_HEIGHT;
                    isJumping = false;
                    yVelocity = 0;
                }
                if(playerY < 0) playerY = 0;
            }
            for(let i=0;i<obstacles.length;i++){
                obstacles[i].x -= speed;
            }
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
            if(frameCounter >= currentGap){
                if(!gameOver){
                    spawnObstacle();
                    let newGap = Math.max(45, baseSpawnGap - Math.floor(score / 400));
                    currentGap = newGap;
                }
                frameCounter = 0;
            } else {
                frameCounter++;
            }
            score += 0.2;
            updateScoreUI();
            if(speed < 8){
                speed = 3.5 + Math.floor(score / 700);
            }
            const playerRect = {
                x: PLAYER_X,
                y: playerY,
                width: PLAYER_WIDTH,
                height: PLAYER_HEIGHT
            };
            for(let obs of obstacles){
                if(checkCollision(playerRect, obs)){
                    gameOver = true;
                    break;
                }
            }
        }

        function draw(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // 天空
            const grad = ctx.createLinearGradient(0,0,0,GROUND_Y-10);
            grad.addColorStop(0,'#f9e7b3');
            grad.addColorStop(1,'#f5d98f');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,canvas.width,GROUND_Y-8);
            // 地面
            ctx.fillStyle = '#8b6b42';
            ctx.fillRect(0,GROUND_Y-3,canvas.width,4);
            ctx.fillStyle = '#b87c4f';
            ctx.fillRect(0,GROUND_Y,canvas.width,canvas.height-GROUND_Y);
            ctx.fillStyle = '#d9a066';
            for(let i=0;i<8;i++){
                let x = (Date.now()*0.008 + i*50) % canvas.width;
                ctx.fillRect(x,GROUND_Y-2,5,3);
            }
            // 障碍物
            for(let obs of obstacles){
                let grd = ctx.createLinearGradient(obs.x, obs.y, obs.x+obs.width, obs.y+obs.height);
                grd.addColorStop(0,'#2f6b2f');
                grd.addColorStop(1,'#1e4d1e');
                ctx.fillStyle = grd;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.fillStyle = '#90be6d';
                for(let i=0;i<2;i++){
                    ctx.fillRect(obs.x+2+i*3, obs.y-2, 2, 3);
                }
            }
            // 主角图片
            if(playerImgReady && playerImg.complete && playerImg.naturalWidth>0){
                try{
                    ctx.drawImage(playerImg, PLAYER_X, playerY, PLAYER_WIDTH, PLAYER_HEIGHT);
                }catch(e){ drawFallback(); }
            } else {
                drawFallback();
            }
            function drawFallback(){
                ctx.fillStyle = '#f39c12';
                ctx.fillRect(PLAYER_X, playerY, PLAYER_WIDTH, PLAYER_HEIGHT);
                ctx.fillStyle = '#e67e22';
                ctx.fillRect(PLAYER_X+4, playerY-4, 10, 4);
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(PLAYER_X+4, playerY+4, 3, 4);
                ctx.fillRect(PLAYER_X+11, playerY+4, 3, 4);
            }
            if(gameOver){
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = '#2d2f36';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.globalAlpha = 1;
                ctx.font = 'bold 14px "Courier New"';
                ctx.fillStyle = '#f7d44a';
                ctx.fillText('GAME OVER', canvas.width/2-45, canvas.height/2);
                ctx.font = '10px monospace';
                ctx.fillStyle = '#eedd99';
                ctx.fillText('点击「重来」', canvas.width/2-40, canvas.height/2+20);
            }
            ctx.font = '9px monospace';
            ctx.fillStyle = '#70563b';
            ctx.fillText('距离: '+Math.floor(score)+'m', canvas.width-65, 18);
        }

        function gameLoop(){
            if(!gameOver) updateGame();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function jump(){
            if(gameOver) return;
            if(!isJumping && playerY >= GROUND_Y - PLAYER_HEIGHT - 1){
                isJumping = true;
                yVelocity = JUMP_POWER;
            }
        }

        function handleKey(e){
            const key = e.key;
            if(key === 'ArrowUp' || key === ' ' || key === 'Space'){
                e.preventDefault();
                jump();
            }
            if(key === 'r' || key === 'R'){
                e.preventDefault();
                resetGame();
            }
        }

        function init(){
            resetGame();
            window.addEventListener('keydown', handleKey);
            canvas.addEventListener('click', (e) => { e.preventDefault(); jump(); });
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
            document.getElementById('restartDinoBtn').addEventListener('click', resetGame);
            document.getElementById('jumpBtn').addEventListener('click', () => { jump(); });
            gameLoop();
        }
        init();
    })();
</script>
</body>
</html>
