<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>奔跑的哥哥｜坤坤跑酷</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #2b2e4a 0%, #1a1c2c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Segoe UI', monospace;
            margin: 0;
            padding: 12px;
        }
        .game-wrapper {
            background: #f7f7f0;
            border-radius: 28px;
            padding: 15px 18px 20px 18px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            width: 100%;
            height: auto;
            max-width: 400px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            gap: 12px;
            background: #e0dfcf;
            padding: 8px 16px;
            border-radius: 50px;
            flex-wrap: wrap;
        }
        .score-box {
            background: #2d2f36;
            padding: 4px 14px;
            border-radius: 40px;
            color: #ffd966;
            font-weight: bold;
            font-size: 1.2rem;
        }
        button {
            background: #3c5a6f;
            border: none;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .jump-btn {
            background: #f39c12;
            color: #1e2a32;
            font-size: 1rem;
            padding: 6px 20px;
        }
        .tip {
            color: #4e5b41;
            background: #d8d7c3;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
        }
        @media (max-width: 450px) {
            .game-wrapper { padding: 10px 12px; }
            .score-box { font-size: 1rem; }
            .jump-btn { font-size: 0.8rem; padding: 5px 16px; }
            .tip { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="400" height="100"></canvas>
        <div class="info-bar">
            <div class="score-box">🏆 <span id="scoreValue">0</span></div>
            <button id="restartDinoBtn">🐾 重来</button>
            <button id="jumpBtn" class="jump-btn">🦘 跳跃</button>
            <div class="tip">点击画布 / 跳跃按钮</div>
        </div>
    </div>
    <p style="text-align:center; margin-top:10px; color:#ccc; font-size:11px;">⭐ 主角自定义图片</p>
</div>

<!-- 背景音乐（循环） -->
<audio id="bgmAudio" src="bgm.mp3" loop preload="auto"></audio>
<!-- 跳跃音效（动态播放） -->
<audio id="jumpAudio" src="jump.mp3" preload="auto"></audio>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ---------- 请修改为你自己的图片文件名 ----------
        const PLAYER_IMG_SRC = 'kun.jpg';   // 例如 '哥哥.jpg' 或 'kun.png'
        let playerImg = new Image();
        playerImg.src = PLAYER_IMG_SRC;
        let playerImgReady = false;
        playerImg.onload = () => { playerImgReady = true; };
        playerImg.onerror = () => { console.warn("图片加载失败，显示橙色方块"); };

        // ---------- 游戏参数（跳更高 + 篮球障碍物）----------
        const GROUND_Y = 82;          // 地面高度（像素）
        const PLAYER_WIDTH = 40;      // 角色宽度（调大）
        const PLAYER_HEIGHT = 48;     // 角色高度（调大）
        const PLAYER_X = 40;

        let yVelocity = 0;
        let playerY = GROUND_Y - PLAYER_HEIGHT;
        let isJumping = false;
        const GRAVITY = 0.6;
        const JUMP_POWER = -14;       // 跳更高！

        let obstacles = [];            // 障碍物数组（篮球）
        let frameCounter = 0;
        let baseSpawnGap = 120;        // 生成间隔（越大越稀疏）
        let currentGap = 100;
        let score = 0;
        let gameOver = false;
        let animationId = null;
        let speed = 3.5;

        // ---------- 背景音乐自动播放（需要用户首次交互）----------
        const bgmAudio = document.getElementById('bgmAudio');
        const jumpAudio = document.getElementById('jumpAudio');
        // 尝试自动播放（浏览器可能限制，但添加一个“点击游戏区启动音乐”的监听更可靠）
        function tryAutoPlay() {
            bgmAudio.play().catch(e => console.log("自动播放被阻止，点击画布后播放"));
        }
        // 用户首次点击画布时启动背景音乐
        function enableAudio() {
            bgmAudio.play().catch(e => console.log);
            canvas.removeEventListener('click', enableAudio);
            canvas.removeEventListener('touchstart', enableAudio);
        }
        canvas.addEventListener('click', enableAudio);
        canvas.addEventListener('touchstart', enableAudio);
        tryAutoPlay();

        // ---------- 辅助函数 ----------
        function updateScoreUI(){
            document.getElementById('scoreValue').innerText = Math.floor(score);
        }

        // 生成篮球障碍物（圆形）
        function spawnObstacle(){
            const ballSize = 14;   // 篮球直径（像素）
            obstacles.push({
                x: canvas.width,
                y: GROUND_Y - ballSize,
                width: ballSize,
                height: ballSize,
                type: 'ball'
            });
        }

        function resetGame(){
            gameOver = false;
            score = 0;
            speed = 3.5;
            obstacles = [];
            frameCounter = 0;
            currentGap = baseSpawnGap;
            playerY = GROUND_Y - PLAYER_HEIGHT;
            yVelocity = 0;
            isJumping = false;
            updateScoreUI();
            setTimeout(() => {
                if(!gameOver) spawnObstacle();
            }, 500);
        }

        function checkCollision(playerRect, obs){
            // 圆形碰撞检测（篮球是圆形，玩家是矩形，做矩形与圆形的近似碰撞）
            const circleX = obs.x + obs.width/2;
            const circleY = obs.y + obs.height/2;
            const radius = obs.width/2;
            const closestX = Math.max(playerRect.x, Math.min(circleX, playerRect.x + playerRect.width));
            const closestY = Math.max(playerRect.y, Math.min(circleY, playerRect.y + playerRect.height));
            const dx = circleX - closestX;
            const dy = circleY - closestY;
            return (dx * dx + dy * dy) < radius * radius;
        }

        function updateGame(){
            if(gameOver) return;
            // 跳跃物理
            if(isJumping){
                yVelocity += GRAVITY;
                playerY += yVelocity;
                if(playerY >= GROUND_Y - PLAYER_HEIGHT){
                    playerY = GROUND_Y - PLAYER_HEIGHT;
                    isJumping = false;
                    yVelocity = 0;
                }
                if(playerY < 0) playerY = 0;
            }
            // 障碍物移动
            for(let i=0;i<obstacles.length;i++){
                obstacles[i].x -= speed;
            }
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
            // 生成新障碍物
            if(frameCounter >= currentGap){
                if(!gameOver){
                    spawnObstacle();
                    let newGap = Math.max(50, baseSpawnGap - Math.floor(score / 400));
                    currentGap = newGap;
                }
                frameCounter = 0;
            } else {
                frameCounter++;
            }
            // 加分 & 加速
            score += 0.2;
            updateScoreUI();
            if(speed < 8){
                speed = 3.5 + Math.floor(score / 700);
            }
            // 碰撞检测（圆形与矩形）
            const playerRect = {
                x: PLAYER_X,
                y: playerY,
                width: PLAYER_WIDTH,
                height: PLAYER_HEIGHT
            };
            for(let obs of obstacles){
                if(checkCollision(playerRect, obs)){
                    gameOver = true;
                    break;
                }
            }
        }

        // ---------- 绘图模块 ----------
        function draw(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // 天空
            const grad = ctx.createLinearGradient(0,0,0,GROUND_Y-10);
            grad.addColorStop(0,'#f9e7b3');
            grad.addColorStop(1,'#f5d98f');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,canvas.width,GROUND_Y-8);
            // 地面
            ctx.fillStyle = '#8b6b42';
            ctx.fillRect(0,GROUND_Y-3,canvas.width,4);
            ctx.fillStyle = '#b87c4f';
            ctx.fillRect(0,GROUND_Y,canvas.width,canvas.height-GROUND_Y);
            ctx.fillStyle = '#d9a066';
            for(let i=0;i<8;i++){
                let x = (Date.now()*0.008 + i*50) % canvas.width;
                ctx.fillRect(x,GROUND_Y-2,5,3);
            }
            // 画篮球障碍物
            for(let obs of obstacles){
                // 篮球底色
                ctx.fillStyle = '#d97a2b';
                ctx.beginPath();
                ctx.arc(obs.x + obs.width/2, obs.y + obs.height/2, obs.width/2, 0, Math.PI*2);
                ctx.fill();
                // 黑色弧线（篮球条纹）
                ctx.beginPath();
                ctx.arc(obs.x + obs.width/2, obs.y + obs.height/2, obs.width/2 - 2, 0, Math.PI*2);
                ctx.strokeStyle = '#2c2c2c';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // 两条交叉弧线
                ctx.beginPath();
                ctx.moveTo(obs.x + obs.width*0.3, obs.y + obs.height*0.3);
                ctx.lineTo(obs.x + obs.width*0.7, obs.y + obs.height*0.7);
                ctx.moveTo(obs.x + obs.width*0.7, obs.y + obs.height*0.3);
                ctx.lineTo(obs.x + obs.width*0.3, obs.y + obs.height*0.7);
                ctx.stroke();
            }
            // 主角图片
            if(playerImgReady && playerImg.complete && playerImg.naturalWidth>0){
                try{
                    ctx.drawImage(playerImg, PLAYER_X, playerY, PLAYER_WIDTH, PLAYER_HEIGHT);
                }catch(e){ drawFallback(); }
            } else {
                drawFallback();
            }
            function drawFallback(){
                ctx.fillStyle = '#f39c12';
                ctx.fillRect(PLAYER_X, playerY, PLAYER_WIDTH, PLAYER_HEIGHT);
                ctx.fillStyle = '#e67e22';
                ctx.fillRect(PLAYER_X+4, playerY-4, 10, 4);
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(PLAYER_X+4, playerY+4, 3, 4);
                ctx.fillRect(PLAYER_X+11, playerY+4, 3, 4);
            }
            // 游戏结束遮罩
            if(gameOver){
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = '#2d2f36';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.globalAlpha = 1;
                ctx.font = 'bold 14px "Courier New"';
                ctx.fillStyle = '#f7d44a';
                ctx.fillText('GAME OVER', canvas.width/2-45, canvas.height/2);
                ctx.font = '10px monospace';
                ctx.fillStyle = '#eedd99';
                ctx.fillText('点击「重来」', canvas.width/2-40, canvas.height/2+20);
            }
            ctx.font = '9px monospace';
            ctx.fillStyle = '#70563b';
            ctx.fillText('距离: '+Math.floor(score)+'m', canvas.width-65, 18);
        }

        function gameLoop(){
            if(!gameOver) updateGame();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function jump(){
            if(gameOver) return;
            if(!isJumping && playerY >= GROUND_Y - PLAYER_HEIGHT - 1){
                // 播放跳跃音效
                jumpAudio.currentTime = 0;   // 重置播放位置，避免重叠时卡顿
                jumpAudio.play().catch(e=>console.log);
                isJumping = true;
                yVelocity = JUMP_POWER;
            }
        }

        function handleKey(e){
            const key = e.key;
            if(key === 'ArrowUp' || key === ' ' || key === 'Space'){
                e.preventDefault();
                jump();
            }
            if(key === 'r' || key === 'R'){
                e.preventDefault();
                resetGame();
            }
        }

        function init(){
            resetGame();
            window.addEventListener('keydown', handleKey);
            canvas.addEventListener('click', (e) => { e.preventDefault(); jump(); });
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
            document.getElementById('restartDinoBtn').addEventListener('click', () => resetGame());
            document.getElementById('jumpBtn').addEventListener('click', () => jump());
            gameLoop();
        }
        init();
    })();
</script>
</body>
</html>
