<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>bailidashi · 个人站点</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #03060c;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            color: #edf2ff;
            line-height: 1.5;
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            background: rgba(18, 24, 34, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 2.5rem;
            padding: 2rem 2rem 2.2rem;
            border: 1px solid rgba(72, 187, 255, 0.15);
            box-shadow:
                0 30px 45px -20px rgba(0, 0, 0, 0.6),
                0 0 60px -10px rgba(72, 150, 255, 0.08);
            transition: box-shadow 0.5s, border-color 0.5s;
        }
        .card:hover {
            border-color: rgba(100, 180, 255, 0.35);
            box-shadow:
                0 30px 45px -20px rgba(0, 0, 0, 0.6),
                0 0 80px -5px rgba(72, 150, 255, 0.18);
        }

        .intro {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .avatar-wrapper {
            flex-shrink: 0;
        }
        .avatar {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #2d4059;
            box-shadow: 0 12px 22px -8px rgba(0, 0, 0, 0.5);
            transition: transform 0.25s, border-color 0.2s, box-shadow 0.2s;
        }
        .avatar:hover {
            transform: scale(1.04);
            border-color: #5f9eff;
            box-shadow: 0 12px 30px -6px rgba(95, 158, 255, 0.3);
        }
        .title-section h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(120deg, #ffffff, #9bb8ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 0.2rem;
        }
        .title-section .tagline {
            color: #9cb3d9;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .title-section .desc {
            margin-top: 0.6rem;
            font-size: 0.95rem;
            color: #cddcff;
            max-width: 85%;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 1.8rem 0 1.5rem;
        }
        .skill-badge {
            background: #1e2a3e;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #bdd3ff;
            backdrop-filter: blur(4px);
            border: 1px solid #2d4059;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeInUp 0.5s ease forwards;
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }
        .skill-badge:hover {
            background: #243352;
            border-color: #4f7eff;
            box-shadow: 0 0 16px rgba(79, 126, 255, 0.25);
        }
        .skill-badge:nth-child(1) { animation-delay: 0.1s; }
        .skill-badge:nth-child(2) { animation-delay: 0.2s; }
        .skill-badge:nth-child(3) { animation-delay: 0.3s; }
        .skill-badge:nth-child(4) { animation-delay: 0.4s; }
        .skill-badge:nth-child(5) { animation-delay: 0.5s; }
        .skill-badge i {
            margin-right: 6px;
            font-size: 0.75rem;
            color: #7aa9ff;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 互动区域（游戏+留言） */
        .interactive-zone {
            margin: 2rem 0 1.5rem;
        }
        .zone-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #bdd3ff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-left: 3px solid #5f9eff;
            padding-left: 0.8rem;
        }
        .projects {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .project-card {
            background: #11171fcc;
            backdrop-filter: blur(4px);
            flex: 1;
            min-width: 150px;
            border-radius: 1.5rem;
            padding: 1rem 1.2rem;
            border: 1px solid #2a3748;
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }
        .project-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(79, 150, 255, 0.08) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.35s;
            pointer-events: none;
        }
        .project-card:hover {
            border-color: #4f7eff;
            transform: translateY(-4px);
            background: #17212bcc;
            box-shadow: 0 8px 28px rgba(79, 126, 255, 0.15), 0 0 0 1px rgba(79, 126, 255, 0.3) inset;
        }
        .project-card:hover::before {
            opacity: 1;
        }
        .project-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            transition: transform 0.3s;
        }
        .project-card:hover .project-icon {
            transform: scale(1.1);
        }
        .project-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }
        .project-desc {
            font-size: 0.75rem;
            color: #99b0e0;
            margin-bottom: 1rem;
        }
        .project-link {
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            color: #94b4ff;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: gap 0.2s, color 0.2s;
        }
        .project-link:hover {
            color: white;
            gap: 10px;
        }

        /* 评论区容器 */
        .comments-container {
            width: 100%;
            margin-top: 1rem;
            border-radius: 1rem;
            overflow: hidden;
        }

        hr {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, #2a3a50, #4e6b8f, #2a3a50);
            margin: 1.8rem 0 1.2rem;
        }
        .contact {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.85rem;
            color: #b7c9f0;
        }
        .contact a {
            color: #97b5ff;
            text-decoration: none;
        }
        .contact a:hover {
            color: white;
            text-decoration: underline;
        }
        .footer-quote {
            text-align: center;
            font-size: 0.75rem;
            color: #6b7f9f;
            margin-top: 1.4rem;
            letter-spacing: 0.3px;
        }
        i {
            margin-right: 4px;
        }
        @media (max-width: 620px) {
            body { padding: 1rem; }
            .card { padding: 1.5rem; }
            .intro { flex-direction: column; align-items: center; text-align: center; gap: 1rem; }
            .title-section .desc { max-width: 100%; }
            .projects { flex-direction: column; }
            .contact { justify-content: center; text-align: center; }
        }
    </style>
</head>

<script>
    // 粒子星空背景
    (function(){
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const PARTICLE_COUNT = 80;
        let w, h;

        function resize(){
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        for(let i = 0; i < PARTICLE_COUNT; i++){
            particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                r: Math.random() * 1.8 + 0.5,
                alpha: Math.random() * 0.6 + 0.2,
                twinkleSpeed: Math.random() * 0.02 + 0.005,
                twinkleOffset: Math.random() * Math.PI * 2
            });
        }

        function draw(){
            ctx.clearRect(0, 0, w, h);

            // 连线
            for(let i = 0; i < particles.length; i++){
                for(let j = i + 1; j < particles.length; j++){
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if(dist < 120){
                        ctx.strokeStyle = `rgba(100,160,255,${0.08 * (1 - dist / 120)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            // 粒子
            const now = Date.now();
            for(let p of particles){
                const flicker = Math.sin(now * p.twinkleSpeed + p.twinkleOffset) * 0.3 + 0.7;
                ctx.fillStyle = `rgba(140,190,255,${p.alpha * flicker})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();

                p.x += p.vx;
                p.y += p.vy;

                if(p.x < -10) p.x = w + 10;
                if(p.x > w + 10) p.x = -10;
                if(p.y < -10) p.y = h + 10;
                if(p.y > h + 10) p.y = -10;
            }

            requestAnimationFrame(draw);
        }
        draw();
    })();
</script>
