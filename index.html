<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>百裏 · 未来工坊</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2fa;  /* 极浅冷灰蓝 */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #1c2c3c;
            line-height: 1.5;
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 冷色调光晕背景 (低饱和蓝紫色) */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at 20% 30%, rgba(120, 180, 255, 0.08), transparent 60%),
                        radial-gradient(circle at 80% 70%, rgba(80, 140, 210, 0.06), transparent 70%);
        }

        /* 极简网格线 (很淡) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(100, 130, 180, 0.08) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(100, 130, 180, 0.08) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* 主卡片 — 多层玻璃，边缘锐利，无彩色流光 */
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.05),
                0 0 0 1px rgba(255, 255, 255, 0.9) inset,
                0 0 0 2px rgba(100, 150, 200, 0.1) inset;
            transition: box-shadow 0.3s, transform 0.2s;
        }
        .card:hover {
            box-shadow: 
                0 25px 40px rgba(0, 0, 0, 0.08),
                0 0 0 1px rgba(255, 255, 255, 0.95) inset,
                0 0 0 2px rgba(80, 140, 210, 0.2) inset;
            transform: translateY(-2px);
        }

        /* 头部 */
        .intro {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08), 0 0 0 3px rgba(80, 140, 210, 0.3);
            transition: all 0.25s;
        }
        .avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12), 0 0 0 4px rgba(80, 140, 210, 0.5);
        }
        .title-section h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e3b5c;
            letter-spacing: -0.5px;
        }
        .tagline {
            color: #3c6e9c;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .desc {
            color: #2c4c6e;
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }

        /* 技能标签 — 冷感玻璃 */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin: 1.8rem 0 1rem;
        }
        .skill-badge {
            background: rgba(230, 240, 250, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1e4a76;
            border: 0.5px solid rgba(80, 140, 210, 0.4);
            transition: all 0.2s;
        }
        .skill-badge:hover {
            background: white;
            border-color: #5c9ad5;
            transform: translateY(-2px);
        }

        /* 访客计数 */
        .visitor-count {
            background: rgba(240, 245, 250, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.2rem 0.8rem;
            border-radius: 60px;
            display: inline-block;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            border: 0.5px solid rgba(80, 140, 210, 0.3);
        }

        /* 区块标题 */
        .zone-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 1.8rem 0 1rem;
            color: #1e3b5c;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border-left: 3px solid #5c9ad5;
            padding-left: 0.8rem;
        }

        /* 游戏卡片 — 干净磨砂 */
        .projects {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .project-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(8px);
            flex: 1;
            min-width: 150px;
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid rgba(80, 140, 210, 0.25);
            transition: all 0.3s ease;
        }
        .project-card:hover {
            background: white;
            transform: translateY(-4px);
            border-color: #5c9ad5;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.05);
        }
        .project-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .project-title {
            font-weight: 700;
            font-size: 1rem;
        }
        .project-desc {
            font-size: 0.7rem;
            color: #4a627a;
            margin: 0.3rem 0 0.8rem;
        }
        .project-link {
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c6eb0;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* 工具箱 — 冷色玻璃卡片 */
        .toolbox-section {
            margin: 2rem 0 1.5rem;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin: 1rem 0 1.2rem;
            flex-wrap: wrap;
            background: rgba(240, 245, 250, 0.6);
            border-radius: 60px;
            padding: 5px;
            backdrop-filter: blur(8px);
            width: fit-content;
        }
        .tab {
            background: transparent;
            border: none;
            padding: 6px 18px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #2c4e6e;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: white;
            color: #1e6bb8;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .tool-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 1.2rem;
            padding: 1rem;
            border: 1px solid rgba(80, 140, 210, 0.25);
            transition: all 0.25s;
        }
        .tool-card:hover {
            background: white;
            transform: translateY(-2px);
            border-color: #5c9ad5;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.05);
        }
        .tool-card-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .tool-icon {
            font-size: 1.6rem;
        }
        .tool-card h4 {
            font-weight: 700;
            font-size: 1rem;
            color: #1e3b5c;
        }
        .tool-desc {
            font-size: 0.75rem;
            color: #4a627a;
            margin: 6px 0 8px;
        }
        .tool-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .tool-tag {
            background: #eef3fc;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            color: #2c6eb0;
        }
        .tool-link {
            font-size: 0.8rem;
            color: #2c6eb0;
            text-decoration: none;
            font-weight: 500;
        }

        /* 评论区容器 */
        .comments-container {
            margin-top: 2rem;
        }

        hr {
            margin: 1.8rem 0 1.2rem;
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8ab3d0, #5c9ad5, #8ab3d0, transparent);
        }
        .contact {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            font-size: 0.8rem;
            color: #4a627a;
        }
        .contact a {
            color: #2c6eb0;
            text-decoration: none;
        }
        .footer-quote {
            text-align: center;
            font-size: 0.75rem;
            color: #6a84a0;
            margin-top: 1rem;
        }
        @media (max-width: 680px) {
            .card { padding: 1.2rem; }
            .tool-grid { grid-template-columns: 1fr; }
            .tabs { width: 100%; justify-content: center; }
            .intro { justify-content: center; text-align: center; }
        }
    </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">
    <div class="card">
        <div class="intro">
            <img src="我的头像.jpg" alt="百裏" class="avatar" onerror="this.src='https://placehold.co/110x110?text=avatar'">
            <div class="title-section">
                <h1>百裏</h1>
                <div class="tagline"><i class="fas fa-microchip"></i> 重庆文理学院 · 大一</div>
                <div class="desc">嵌入式 / 三菱PLC / Git · 用代码构建未来</div>
            </div>
        </div>

        <div class="skills">
            <span class="skill-badge"><i class="fas fa-microcontroller"></i> ESP32/STM32</span>
            <span class="skill-badge"><i class="fas fa-industry"></i> 三菱GX2</span>
            <span class="skill-badge"><i class="fab fa-git-alt"></i> Git基础</span>
            <span class="skill-badge"><i class="fas fa-chalkboard-user"></i> 家教经验</span>
            <span class="skill-badge"><i class="fas fa-cube"></i> SolidWorks/UG</span>
        </div>

        <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
        <div class="visitor-count">❄️ 已有 <span id="busuanzi_value_site_pv"></span> 位访客</div>

        <div class="zone-title"><i class="fas fa-gamepad"></i> 互动区 · 游乐舱</div>
        <div class="projects">
            <div class="project-card">
                <div class="project-icon">🐍</div>
                <div class="project-title">贪吃蛇·经典</div>
                <div class="project-desc">键盘/方向按钮</div>
                <a href="snake.html" class="project-link">开始 →</a>
            </div>
            <div class="project-card">
                <div class="project-icon">🏃‍♂️</div>
                <div class="project-title">奔跑的哥哥</div>
                <div class="project-desc">点击跳跃跑酷</div>
                <a href="dinosaur.html" class="project-link">启动 →</a>
            </div>
            <div class="project-card">
                <div class="project-icon">🧩</div>
                <div class="project-title">俄罗斯方块</div>
                <div class="project-desc">经典消除</div>
                <a href="tetris.html" class="project-link">挑战 →</a>
            </div>
            <div class="project-card">
                <div class="project-icon"><i class="fab fa-github"></i></div>
                <div class="project-title">GitHub 仓库</div>
                <div class="project-desc">开源/学习记录</div>
                <a href="https://github.com/bailidashi" class="project-link" target="_blank">访问 →</a>
            </div>
        </div>

        <div class="toolbox-section">
            <div class="zone-title"><i class="fas fa-toolbox"></i> 极客工具箱</div>
            <div class="tabs" id="toolTabs">
                <div class="tab active" data-cat="dev">开发</div>
                <div class="tab" data-cat="design">设计</div>
                <div class="tab" data-cat="ai">AI</div>
                <div class="tab" data-cat="prod">效率</div>
                <div class="tab" data-cat="learn">学习</div>
            </div>
            <div id="toolboxGrid" class="tool-grid"></div>
        </div>

        <div class="comments-container">
            <script src="https://utteranc.es/client.js"
                    repo="bailidashi/bailidashi.github.io"
                    issue-term="pathname"
                    label="blog"
                    theme="github-light"
                    crossorigin="anonymous"
                    async>
            </script>
        </div>

        <hr>
        <div class="contact">
            <span><i class="far fa-envelope"></i> 3154997545@qq.com</span>
            <span><i class="fab fa-qq"></i> QQ: 3154997545</span>
            <span><i class="fab fa-bilibili"></i> <a href="https://space.bilibili.com/514882301" target="_blank" rel="noopener noreferrer">B站主页</a></span>
            <span><i class="fas fa-map-marker-alt"></i> 持续迭代</span>
        </div>
        <div class="footer-quote">“冷色调 · 精确 · 未来主义”</div>
    </div>
</div>

<script>
    // 工具箱数据 (与原一致)
    const toolboxData = {
        dev: [
            { icon:'📦', title:'GitHub', desc:'全球最大代码托管平台，开源项目协作核心。', tags:['代码托管','开源'], url:'https://github.com' },
            { icon:'🔗', title:'Vercel', desc:'前端部署平台，自动部署、全球CDN、Serverless。', tags:['部署','前端'], url:'https://vercel.com' },
            { icon:'⚡', title:'npm', desc:'Node.js 包管理器，JavaScript 生态的核心。', tags:['包管理','Node.js'], url:'https://www.npmjs.com' },
            { icon:'🌐', title:'MDN', desc:'最权威的 Web 技术文档，由 Mozilla 维护。', tags:['文档','Web'], url:'https://developer.mozilla.org' },
            { icon:'🔍', title:'Stack Overflow', desc:'程序员问答社区，解决编码难题的首选。', tags:['问答','社区'], url:'https://stackoverflow.com' },
            { icon:'🛠️', title:'CodePen', desc:'前端代码在线编辑与展示平台。', tags:['前端','在线编辑'], url:'https://codepen.io' }
        ],
        design: [
            { icon:'🎨', title:'Figma', desc:'在线 UI 设计协作工具，原型设计与团队协作。', tags:['UI设计','协作'], url:'https://www.figma.com' },
            { icon:'🌈', title:'Coolors', desc:'快速生成配色方案，支持多种格式导出。', tags:['配色','灵感'], url:'https://coolors.co' },
            { icon:'🖼️', title:'Unsplash', desc:'高质量免费图片库，可用于商业和个人项目。', tags:['图片','免费'], url:'https://unsplash.com' },
            { icon:'🔤', title:'Font Awesome', desc:'海量矢量图标库，Web 与桌面应用通用。', tags:['图标','字体'], url:'https://fontawesome.com' },
            { icon:'✏️', title:'Dribbble', desc:'全球设计师社区，作品展示与灵感获取。', tags:['设计社区','作品集'], url:'https://dribbble.com' }
        ],
        ai: [
            { icon:'🤖', title:'ChatGPT', desc:'OpenAI 对话模型，智能问答与内容创作。', tags:['AI对话','创作'], url:'https://chat.openai.com' },
            { icon:'🧠', title:'Claude', desc:'Anthropic 出品的 AI 助手，深度分析与写作。', tags:['AI助手','分析'], url:'https://claude.ai' },
            { icon:'🎯', title:'Hugging Face', desc:'AI 模型库与社区，开源模型的宝库。', tags:['模型库','开源'], url:'https://huggingface.co' },
            { icon:'🎵', title:'Suno AI', desc:'AI 音乐生成，输入描述即可创作音乐。', tags:['音乐','生成'], url:'https://suno.ai' },
            { icon:'🎬', title:'Runway', desc:'AI 视频编辑与生成平台，创意工具集。', tags:['视频','编辑'], url:'https://runwayml.com' }
        ],
        prod: [
            { icon:'💻', title:'VSCode', desc:'微软开源编辑器，插件丰富、性能卓越。', tags:['编辑器','开源'], url:'https://code.visualstudio.com' },
            { icon:'📝', title:'Notion', desc:'全能笔记与知识管理平台，支持协作。', tags:['笔记','知识库'], url:'https://www.notion.so' },
            { icon:'🔎', title:'Everything', desc:'Windows 秒级文件搜索引擎，轻量高效。', tags:['搜索','Windows'], url:'https://www.voidtools.com' },
            { icon:'🎥', title:'ScreenToGif', desc:'免费屏幕录制与 GIF 制作，轻量好用。', tags:['录屏','GIF'], url:'https://www.screentogif.com' },
            { icon:'🗂️', title:'Obsidian', desc:'Markdown 双链笔记，知识管理利器。', tags:['笔记','Markdown'], url:'https://obsidian.md' }
        ],
        learn: [
            { icon:'📘', title:'菜鸟教程', desc:'中文编程教程网站，涵盖多种技术栈。', tags:['教程','中文'], url:'https://www.runoob.com' },
            { icon:'🎓', title:'B站', desc:'海量免费编程与设计教学视频资源。', tags:['视频','教学'], url:'https://www.bilibili.com' },
            { icon:'🏆', title:'LeetCode', desc:'算法题库，提升编程能力与面试准备。', tags:['算法','面试'], url:'https://leetcode.com' },
            { icon:'📖', title:'FreeCodeCamp', desc:'免费编程课程，项目驱动式学习。', tags:['免费','课程'], url:'https://www.freecodecamp.org' },
            { icon:'💡', title:'CS自学指南', desc:'计算机科学自学路径与资源汇总。', tags:['CS','自学'], url:'https://csdiy.wiki' }
        ]
    };

    function renderToolbox(cat) {
        const grid = document.getElementById('toolboxGrid');
        const items = toolboxData[cat];
        if (!items) return;
        grid.innerHTML = items.map(item => `
            <div class="tool-card">
                <div class="tool-card-top">
                    <span class="tool-icon">${item.icon}</span>
                    <h4>${item.title}</h4>
                </div>
                <div class="tool-desc">${item.desc}</div>
                <div class="tool-tags">
                    ${item.tags.map(t => `<span class="tool-tag">${t}</span>`).join('')}
                </div>
                <a href="${item.url}" target="_blank" class="tool-link">打开 →</a>
            </div>
        `).join('');
    }

    renderToolbox('dev');
    const tabs = document.querySelectorAll('#toolTabs .tab');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            renderToolbox(tab.getAttribute('data-cat'));
        });
    });
</script>
</body>
</html>
