<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>百裏 · 极客玻璃</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #1c2a3a;
            line-height: 1.5;
            padding: 2rem 1rem;
            position: relative;
            min-height: 100vh;
        }

        /* 冷调渐变背景（无彩虹） */
        body::before {
            content: "";
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 30% 40%, rgba(70, 130, 200, 0.08), rgba(200, 220, 250, 0.02));
            z-index: 0;
            pointer-events: none;
        }

        /* 极简网格（细线，低对比） */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(80, 120, 160, 0.1) 0.5px, transparent 0.5px),
                linear-gradient(90deg, rgba(80, 120, 160, 0.1) 0.5px, transparent 0.5px);
            background-size: 32px 32px;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* 主卡片 – 冷色玻璃，锐利边缘 */
        .card {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05), 0 0 0 0.5px rgba(255, 255, 255, 0.6) inset;
            transition: box-shadow 0.3s ease, transform 0.2s;
        }
        .card:hover {
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1), 0 0 0 0.5px rgba(255, 255, 255, 1) inset;
        }

        /* 头部 – 干净利落 */
        .intro {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
        }
        .title-section h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #1e3b5c;
            letter-spacing: -0.3px;
            margin-bottom: 0.2rem;
        }
        .tagline {
            color: #4a6a8a;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .desc {
            color: #2c4e6e;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        /* 技能标签 – 极简半透明 */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 1.5rem 0 1rem;
        }
        .skill-badge {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 0.3rem 1rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: #2c5a7a;
            border: 0.5px solid rgba(80, 120, 160, 0.2);
            transition: all 0.2s;
        }
        .skill-badge:hover {
            background: white;
            border-color: #7f9fbf;
            transform: translateY(-1px);
        }

        /* 访客计数 – 融入 */
        .visitor-count {
            font-size: 0.8rem;
            color: #4a6e8c;
            background: rgba(255,255,245,0.6);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            margin-bottom: 1rem;
        }

        /* 区块标题 */
        .zone-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 1.8rem 0 1rem;
            color: #1e3b5c;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-left: 3px solid #5f9eff;
            padding-left: 0.8rem;
        }

        /* 游戏卡片 – 克制悬停 */
        .projects {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .project-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(8px);
            flex: 1;
            min-width: 150px;
            border-radius: 1.2rem;
            padding: 1rem;
            border: 1px solid rgba(80, 120, 160, 0.2);
            transition: all 0.25s ease;
        }
        .project-card:hover {
            background: white;
            transform: translateY(-3px);
            border-color: #8ab3d0;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
        }
        .project-icon {
            font-size: 1.6rem;
            margin-bottom: 0.4rem;
        }
        .project-title {
            font-weight: 700;
            font-size: 0.95rem;
        }
        .project-desc {
            font-size: 0.7rem;
            color: #5a6e8a;
            margin: 0.3rem 0 0.8rem;
        }
        .project-link {
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            color: #2c6eb0;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* 工具箱 – 简洁玻璃网格 */
        .toolbox-section {
            margin: 2rem 0 1.5rem;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin: 1rem 0 1.2rem;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 4px;
            width: fit-content;
        }
        .tab {
            background: transparent;
            border: none;
            padding: 6px 18px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c5a7a;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab.active {
            background: white;
            color: #1e6bb8;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
        }
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }
        .tool-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 1.2rem;
            padding: 1rem;
            border: 1px solid rgba(80, 120, 160, 0.2);
            transition: all 0.2s;
        }
        .tool-card:hover {
            background: white;
            transform: translateY(-2px);
            border-color: #8ab3d0;
        }
        .tool-card-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .tool-icon {
            font-size: 1.4rem;
        }
        .tool-card h4 {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e3b5c;
        }
        .tool-desc {
            font-size: 0.72rem;
            color: #5a6e8a;
            margin: 6px 0 8px;
        }
        .tool-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        .tool-tag {
            background: #eef3fc;
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 0.6rem;
            color: #2c6eb0;
        }
        .tool-link {
            font-size: 0.75rem;
            color: #2c6eb0;
            text-decoration: none;
            font-weight: 500;
        }

        hr {
            margin: 1.8rem 0 1rem;
            border: none;
            height: 0.5px;
            background: linear-gradient(90deg, transparent, #9bb8d0, #5f9eff, #9bb8d0, transparent);
        }
        .contact {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            font-size: 0.75rem;
            color: #5a6e8a;
        }
        .contact a {
            color: #2c6eb0;
            text-decoration: none;
        }
        .footer-quote {
            text-align: center;
            font-size: 0.7rem;
            color: #7a8eaa;
            margin-top: 1rem;
        }
        @media (max-width: 680px) {
            .card { padding: 1.2rem; }
            .tool-grid { grid-template-columns: 1fr; }
            .tabs { width: 100%; justify-content: center; }
            .intro { justify-content: center; text-align: center; }
        }
    </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">
    <div class="card">
        <div class="intro">
            <img src="我的头像.jpg" alt="百裏" class="avatar" onerror="this.src='https://placehold.co/100x100?text=avatar'">
            <div class="title-section">
                <h1>百裏</h1>
                <div class="tagline"><i class="fas fa-microchip"></i> 重庆文理学院 · 大一</div>
                <div class="desc">嵌入式 / 三菱PLC / Git · 记录成长</div>
            </div>
        </div>

        <div class="skills">
            <span class="skill-badge"><i class="fas fa-microcontroller"></i> ESP32/STM32</span>
            <span class="skill-badge"><i class="fas fa-industry"></i> 三菱GX2</span>
            <span class="skill-badge"><i class="fab fa-git-alt"></i> Git基础</span>
            <span class="skill-badge"><i class="fas fa-chalkboard-user"></i> 家教经验</span>
            <span class="skill-badge"><i class="fas fa-cube"></i> SolidWorks/UG</span>
        </div>

        <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
        <div class="visitor-count">📊 已有 <span id="busuanzi_value_site_pv"></span> 人了解过我</div>

        <div class="zone-title"><i class="fas fa-gamepad"></i> 互动 · 游戏</div>
        <div class="projects">
            <div class="project-card">
                <div class="project-icon">🐍</div>
                <div class="project-title">贪吃蛇</div>
                <div class="project-desc">经典方向控制</div>
                <a href="snake.html" class="project-link">开始 →</a>
            </div>
            <div class="project-card">
                <div class="project-icon">🏃‍♂️</div>
                <div class="project-title">奔跑的哥哥</div>
                <div class="project-desc">点击跳跃跑酷</div>
                <a href="dinosaur.html" class="project-link">跑酷 →</a>
            </div>
            <div class="project-card">
                <div class="project-icon">🧩</div>
                <div class="project-title">俄罗斯方块</div>
                <div class="project-desc">经典消除</div>
                <a href="tetris.html" class="project-link">挑战 →</a>
            </div>
            <div class="project-card">
                <div class="project-icon"><i class="fab fa-github"></i></div>
                <div class="project-title">GitHub</div>
                <div class="project-desc">开源学习记录</div>
                <a href="https://github.com/bailidashi" class="project-link" target="_blank">访问 →</a>
            </div>
        </div>

        <div class="toolbox-section">
            <div class="zone-title"><i class="fas fa-toolbox"></i> 工具箱 · 资源库</div>
            <div class="tabs" id="toolTabs">
                <div class="tab active" data-cat="dev">开发</div>
                <div class="tab" data-cat="design">设计</div>
                <div class="tab" data-cat="ai">AI</div>
                <div class="tab" data-cat="prod">效率</div>
                <div class="tab" data-cat="learn">学习</div>
            </div>
            <div id="toolboxGrid" class="tool-grid"></div>
        </div>

        <div class="comments-container" style="margin-top: 2rem;">
            <script src="https://utteranc.es/client.js"
                    repo="bailidashi/bailidashi.github.io"
                    issue-term="pathname"
                    label="blog"
                    theme="github-light"
                    crossorigin="anonymous"
                    async>
            </script>
        </div>

        <hr>
        <div class="contact">
            <span><i class="far fa-envelope"></i> 3154997545@qq.com</span>
            <span><i class="fab fa-qq"></i> QQ: 3154997545</span>
            <span><i class="fab fa-bilibili"></i> <a href="https://space.bilibili.com/514882301" target="_blank">B站主页</a></span>
            <span><i class="fas fa-map-marker-alt"></i> 天才盖亚是个人物</span>
        </div>
        <div class="footer-quote">“学无止境 ·”</div>
    </div>
</div>

<script>
    const toolboxData = {
        dev: [
            { icon:'📦', title:'GitHub', desc:'全球最大代码托管平台', tags:['代码托管','开源'], url:'https://github.com' },
            { icon:'🔗', title:'Vercel', desc:'前端部署与CDN', tags:['部署','前端'], url:'https://vercel.com' },
            { icon:'⚡', title:'npm', desc:'Node.js 包管理器', tags:['包管理','Node.js'], url:'https://www.npmjs.com' },
            { icon:'🌐', title:'MDN', desc:'权威 Web 文档', tags:['文档','Web'], url:'https://developer.mozilla.org' },
            { icon:'🔍', title:'Stack Overflow', desc:'程序员问答社区', tags:['问答','社区'], url:'https://stackoverflow.com' },
            { icon:'🛠️', title:'CodePen', desc:'前端在线编辑', tags:['前端','在线编辑'], url:'https://codepen.io' }
        ],
        design: [
            { icon:'🎨', title:'Figma', desc:'UI 设计协作工具', tags:['UI设计','协作'], url:'https://www.figma.com' },
            { icon:'🌈', title:'Coolors', desc:'配色方案生成', tags:['配色','灵感'], url:'https://coolors.co' },
            { icon:'🖼️', title:'Unsplash', desc:'高质量免费图片', tags:['图片','免费'], url:'https://unsplash.com' },
            { icon:'🔤', title:'Font Awesome', desc:'矢量图标库', tags:['图标','字体'], url:'https://fontawesome.com' },
            { icon:'✏️', title:'Dribbble', desc:'设计师社区', tags:['设计社区','作品集'], url:'https://dribbble.com' }
        ],
        ai: [
            { icon:'🤖', title:'ChatGPT', desc:'OpenAI 对话模型', tags:['AI对话','创作'], url:'https://chat.openai.com' },
            { icon:'🧠', title:'Claude', desc:'Anthropic AI 助手', tags:['AI助手','分析'], url:'https://claude.ai' },
            { icon:'🎯', title:'Hugging Face', desc:'AI 模型库', tags:['模型库','开源'], url:'https://huggingface.co' },
            { icon:'🎵', title:'Suno AI', desc:'AI 音乐生成', tags:['音乐','生成'], url:'https://suno.ai' },
            { icon:'🎬', title:'Runway', desc:'AI 视频编辑', tags:['视频','编辑'], url:'https://runwayml.com' }
        ],
        prod: [
            { icon:'💻', title:'VSCode', desc:'开源编辑器', tags:['编辑器','开源'], url:'https://code.visualstudio.com' },
            { icon:'📝', title:'Notion', desc:'全能笔记', tags:['笔记','知识库'], url:'https://www.notion.so' },
            { icon:'🔎', title:'Everything', desc:'Windows 文件搜索', tags:['搜索','Windows'], url:'https://www.voidtools.com' },
            { icon:'🎥', title:'ScreenToGif', desc:'录屏 GIF 制作', tags:['录屏','GIF'], url:'https://www.screentogif.com' },
            { icon:'🗂️', title:'Obsidian', desc:'Markdown 双链笔记', tags:['笔记','Markdown'], url:'https://obsidian.md' }
        ],
        learn: [
            { icon:'📘', title:'菜鸟教程', desc:'中文编程教程', tags:['教程','中文'], url:'https://www.runoob.com' },
            { icon:'🎓', title:'B站', desc:'免费教学视频', tags:['视频','教学'], url:'https://www.bilibili.com' },
            { icon:'🏆', title:'LeetCode', desc:'算法题库', tags:['算法','面试'], url:'https://leetcode.com' },
            { icon:'📖', title:'FreeCodeCamp', desc:'免费编程课程', tags:['免费','课程'], url:'https://www.freecodecamp.org' },
            { icon:'💡', title:'CS自学指南', desc:'计算机自学路径', tags:['CS','自学'], url:'https://csdiy.wiki' }
        ]
    };

    function renderToolbox(cat) {
        const grid = document.getElementById('toolboxGrid');
        const items = toolboxData[cat];
        if (!items) return;
        grid.innerHTML = items.map(item => `
            <div class="tool-card">
                <div class="tool-card-top">
                    <span class="tool-icon">${item.icon}</span>
                    <h4>${item.title}</h4>
                </div>
                <div class="tool-desc">${item.desc}</div>
                <div class="tool-tags">
                    ${item.tags.map(t => `<span class="tool-tag">${t}</span>`).join('')}
                </div>
                <a href="${item.url}" target="_blank" class="tool-link">打开 →</a>
            </div>
        `).join('');
    }

    renderToolbox('dev');
    const tabs = document.querySelectorAll('#toolTabs .tab');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            renderToolbox(tab.getAttribute('data-cat'));
        });
    });
</script>
</body>
</html>
