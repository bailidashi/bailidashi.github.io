<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>百裏 · 流光工坊</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8f9fc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #1a1d28;
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 点阵背景 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: radial-gradient(#d1d5e0 0.8px, transparent 0.8px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: -1;
        }

        /* ========= 动态光晕背景 ========= */
        .glow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: floatGlow 18s infinite alternate;
        }
        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(5%, 5%) scale(1.2); opacity: 0.5; }
        }

        /* 粒子画布 */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* ========= 主卡片 – 流光玻璃 ========= */
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 255, 255, 0.8) inset;
            transition: box-shadow 0.4s, transform 0.3s;
            position: relative;
            overflow: hidden;
        }
        /* 流光边框动画 */
        .card::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff6ec4, #7873f5, #3b82f6, #00f2fe, #ff6ec4);
            background-size: 300% 300%;
            border-radius: 2.5rem;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s;
            animation: borderGlow 6s ease infinite;
        }
        .card:hover::after {
            opacity: 0.5;
        }
        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 头部区域 */
        .intro {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15), 0 0 0 4px rgba(59,130,246,0.3);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .avatar:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2), 0 0 0 6px rgba(59,130,246,0.5);
        }
        .title-section h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3b5c, #2b5f8a, #3c8ad9);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            animation: shimmer 8s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .tagline {
            color: #2c6eb0;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .desc {
            color: #2c4c6e;
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }

        /* 技能标签 – 发光悬浮 */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin: 1.8rem 0 1rem;
        }
        .skill-badge {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1e4a76;
            border: 1px solid rgba(59,130,246,0.3);
            transition: all 0.2s ease;
            cursor: default;
        }
        .skill-badge:hover {
            background: white;
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(59,130,246,0.2);
        }

        /* 访客计数 */
        .visitor-count {
            background: rgba(255,255,240,0.6);
            backdrop-filter: blur(4px);
            padding: 0.2rem 0.8rem;
            border-radius: 60px;
            display: inline-block;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(59,130,246,0.2);
        }

        /* 区块标题 */
        .zone-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 1.8rem 0 1rem;
            color: #1e3b5c;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
        }

        /* 游戏卡片 – 3D倾斜+光效 */
        .projects {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .project-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(8px);
            flex: 1;
            min-width: 150px;
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid rgba(59,130,246,0.2);
            transition: all 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
            position: relative;
            overflow: hidden;
        }
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }
        .project-card:hover::before {
            left: 100%;
        }
        .project-card:hover {
            background: white;
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1), 0 0 0 2px #3b82f6 inset;
        }
        .project-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            transition: transform 0.2s;
        }
        .project-card:hover .project-icon {
            transform: scale(1.1);
        }
        .project-title {
            font-weight: 700;
            font-size: 1rem;
        }
        .project-desc {
            font-size: 0.7rem;
            color: #4a627a;
            margin: 0.3rem 0 0.8rem;
        }
        .project-link {
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2c6eb0;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* 工具箱区域 - 光效网格 */
        .toolbox-section {
            margin: 2rem 0 1.5rem;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin: 1rem 0 1.2rem;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.4);
            border-radius: 60px;
            padding: 6px;
            backdrop-filter: blur(8px);
            width: fit-content;
        }
        .tab {
            background: transparent;
            border: none;
            padding: 6px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #2c4e6e;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: white;
            color: #1e6bb8;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .tool-card {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            border-radius: 1.2rem;
            padding: 1rem;
            border: 1px solid rgba(59,130,246,0.2);
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .tool-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
            transform: translateX(-100%);
            transition: transform 0.4s;
        }
        .tool-card:hover::after {
            transform: translateX(100%);
        }
        .tool-card:hover {
            background: white;
            transform: translateY(-3px);
            border-color: #3b82f6;
            box-shadow: 0 12px 20px rgba(0,0,0,0.08);
        }
        .tool-card-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .tool-icon {
            font-size: 1.6rem;
        }
        .tool-card h4 {
            font-weight: 700;
            font-size: 1rem;
            color: #1e3b5c;
        }
        .tool-desc {
            font-size: 0.75rem;
            color: #4a627a;
            margin: 6px 0 8px;
        }
        .tool-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .tool-tag {
            background: #eef3fc;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            color: #2c6eb0;
        }
        .tool-link {
            font-size: 0.8rem;
            color: #2c6eb0;
            text-decoration: none;
            font-weight: 500;
        }

        hr {
            margin: 1.8rem 0 1.2rem;
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8ab3d0, #3b82f6, #8ab3d0, transparent);
        }
        .contact {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            font-size: 0.8rem;
            color: #4a627a;
        }
        .contact a {
            color: #2c6eb0;
            text-decoration: none;
        }
        .footer-quote {
            text-align: center;
            font-size: 0.75rem;
            color: #6a84a0;
            margin-top: 1rem;
        }
        @media (max-width: 680px) {
            .card { padding: 1.2rem; }
            .tool-grid { grid-template-columns: 1fr; }
            .tabs { width: 100%; justify-content: center; }
            .intro { justify-content: center; text-align: center; }
        }
    </style>
</head>
<body>
<!-- 动态光晕背景元素 -->
<div class="glow-bg">
    <div class="glow-orb" style="width: 40vw; height: 40vw; background: #8bb5ff; top: -10vh; left: -10vw;"></div>

<div class="container">

        <div class="footer-quote">“学无止境 · 流光与代码的交界”</div>

<script>
    // 工具箱数据
    const toolboxData = {
        dev: [
            { icon:'📦', title:'GitHub', desc:'全球最大代码托管平台，开源项目协作核心。', tags:['代码托管','开源'], url:'https://github.com' },
            { icon:'🔗', title:'Vercel', desc:'前端部署平台，自动部署、全球CDN、Serverless。', tags:['部署','前端'], url:'https://vercel.com' },
            { icon:'⚡', title:'npm', desc:'Node.js 包管理器，JavaScript 生态的核心。', tags:['包管理','Node.js'], url:'https://www.npmjs.com' },
            { icon:'🌐', title:'MDN', desc:'最权威的 Web 技术文档，由 Mozilla 维护。', tags:['文档','Web'], url:'https://developer.mozilla.org' },
            { icon:'🔍', title:'Stack Overflow', desc:'程序员问答社区，解决编码难题的首选。', tags:['问答','社区'], url:'https://stackoverflow.com' },
            { icon:'🛠️', title:'CodePen', desc:'前端代码在线编辑与展示平台。', tags:['前端','在线编辑'], url:'https://codepen.io' }
        ],
        design: [
            { icon:'🎨', title:'Figma', desc:'在线 UI 设计协作工具，原型设计与团队协作。', tags:['UI设计','协作'], url:'https://www.figma.com' },
            { icon:'🌈', title:'Coolors', desc:'快速生成配色方案，支持多种格式导出。', tags:['配色','灵感'], url:'https://coolors.co' },
            { icon:'🖼️', title:'Unsplash', desc:'高质量免费图片库，可用于商业和个人项目。', tags:['图片','免费'], url:'https://unsplash.com' },
            { icon:'🔤', title:'Font Awesome', desc:'海量矢量图标库，Web 与桌面应用通用。', tags:['图标','字体'], url:'https://fontawesome.com' },
            { icon:'✏️', title:'Dribbble', desc:'全球设计师社区，作品展示与灵感获取。', tags:['设计社区','作品集'], url:'https://dribbble.com' }
        ],
        ai: [
            { icon:'🤖', title:'ChatGPT', desc:'OpenAI 对话模型，智能问答与内容创作。', tags:['AI对话','创作'], url:'https://chat.openai.com' },
            { icon:'🧠', title:'Claude', desc:'Anthropic 出品的 AI 助手，深度分析与写作。', tags:['AI助手','分析'], url:'https://claude.ai' },
            { icon:'🎯', title:'Hugging Face', desc:'AI 模型库与社区，开源模型的宝库。', tags:['模型库','开源'], url:'https://huggingface.co' },
            { icon:'🎵', title:'Suno AI', desc:'AI 音乐生成，输入描述即可创作音乐。', tags:['音乐','生成'], url:'https://suno.ai' },
            { icon:'🎬', title:'Runway', desc:'AI 视频编辑与生成平台，创意工具集。', tags:['视频','编辑'], url:'https://runwayml.com' }
        ],
        prod: [
            { icon:'💻', title:'VSCode', desc:'微软开源编辑器，插件丰富、性能卓越。', tags:['编辑器','开源'], url:'https://code.visualstudio.com' },
            { icon:'📝', title:'Notion', desc:'全能笔记与知识管理平台，支持协作。', tags:['笔记','知识库'], url:'https://www.notion.so' },
            { icon:'🔎', title:'Everything', desc:'Windows 秒级文件搜索引擎，轻量高效。', tags:['搜索','Windows'], url:'https://www.voidtools.com' },
            { icon:'🎥', title:'ScreenToGif', desc:'免费屏幕录制与 GIF 制作，轻量好用。', tags:['录屏','GIF'], url:'https://www.screentogif.com' },
            { icon:'🗂️', title:'Obsidian', desc:'Markdown 双链笔记，知识管理利器。', tags:['笔记','Markdown'], url:'https://obsidian.md' }
        ],
        learn: [
            { icon:'📘', title:'菜鸟教程', desc:'中文编程教程网站，涵盖多种技术栈。', tags:['教程','中文'], url:'https://www.runoob.com' },
            { icon:'🎓', title:'B站', desc:'海量免费编程与设计教学视频资源。', tags:['视频','教学'], url:'https://www.bilibili.com' },
            { icon:'🏆', title:'LeetCode', desc:'算法题库，提升编程能力与面试准备。', tags:['算法','面试'], url:'https://leetcode.com' },
            { icon:'📖', title:'FreeCodeCamp', desc:'免费编程课程，项目驱动式学习。', tags:['免费','课程'], url:'https://www.freecodecamp.org' },
            { icon:'💡', title:'CS自学指南', desc:'计算机科学自学路径与资源汇总。', tags:['CS','自学'], url:'https://csdiy.wiki' }
        ]
    };

    function renderToolbox(cat) {
        const grid = document.getElementById('toolboxGrid');
        const items = toolboxData[cat];
        if (!items) return;
        grid.innerHTML = items.map(item => `
            <div class="tool-card">
                <div class="tool-card-top">
                    <span class="tool-icon">${item.icon}</span>
                    <h4>${item.title}</h4>
                </div>
                <div class="tool-desc">${item.desc}</div>
                <div class="tool-tags">
                    ${item.tags.map(t => `<span class="tool-tag">${t}</span>`).join('')}
                </div>
                <a href="${item.url}" target="_blank" class="tool-link">打开 →</a>
            </div>
        `).join('');
    }

    renderToolbox('dev');
    const tabs = document.querySelectorAll('#toolTabs .tab');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            renderToolbox(tab.getAttribute('data-cat'));
        });
    });

    // 粒子特效 (轻微科技感)
    (function() {
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let w, h;
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        for(let i=0;i<60;i++) {
            particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.3,
                r: Math.random() * 2 + 1,
                alpha: Math.random() * 0.4 + 0.2
            });
        }
        function draw() {
            ctx.clearRect(0,0,w,h);
            for(let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(100, 150, 255, ${p.alpha * 0.5})`;
                ctx.fill();
                p.x += p.vx;
                p.y += p.vy;
                if(p.x < -20) p.x = w+20;
                if(p.x > w+20) p.x = -20;
                if(p.y < -20) p.y = h+20;
                if(p.y > h+20) p.y = -20;
            }
            requestAnimationFrame(draw);
        }
        draw();
    })();
</script>
</body>
</html>
