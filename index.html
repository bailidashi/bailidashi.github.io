<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* ============================================================
   景深毛玻璃 · 左侧固定标题｜右侧滑动翻页 (独立页面)
   ============================================================ */
:root {
  --bg-start:        #E8F3EC;
  --bg-end:          #D4E8DA;
  --glass-base:      rgba(235, 248, 235, 0.65);
  --glass-edge:      rgba(80, 120, 90, 0.18);
  --green-accent:    #2F855A;
  --green-light:     #57B68C;
  --text-dark:       #1A2E24;
  --text-dim:        #406653;
  --card-radius:     28px;
  --sidebar-width:   280px;
  --transition:      0.28s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  --snap-duration:   0.5s;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: radial-gradient(ellipse at 30% 40%, var(--bg-start), var(--bg-end));
  font-family: 'Inter', sans-serif;
  color: var(--text-dark);
  height: 100vh;
  overflow: hidden;
  position: relative;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 20% 30%, rgba(87,182,108,0.12), transparent 60%),
              radial-gradient(circle at 85% 70%, rgba(125,207,166,0.1), transparent 70%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background-image: radial-gradient(rgba(30,60,40,0.04) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
  z-index: 0;
}

.depth-layout {
  display: flex;
  height: 100vh;
  width: 100%;
  position: relative;
  z-index: 2;
}

/* ========= 左侧栏：固定标题 + 导航菜单 ========= */
.sidebar-depth {
  width: var(--sidebar-width);
  background: rgba(225, 242, 225, 0.7);
  backdrop-filter: blur(18px);
  border-right: 1px solid var(--glass-edge);
  display: flex;
  flex-direction: column;
  padding: 2rem 1.5rem;
  transition: all 0.3s;
  box-shadow: 8px 0 25px -12px rgba(40, 70, 50, 0.15);
  z-index: 10;
  overflow-y: auto;
}
.sidebar-depth::-webkit-scrollbar { width: 3px; }

.brand-depth {
  text-align: left;
  margin-bottom: 2.2rem;
  padding-bottom: 1.2rem;
  border-bottom: 1px solid rgba(47,133,90,0.25);
}
.avatar-depth {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--green-accent);
  box-shadow: 0 0 15px rgba(47,133,90,0.25);
  background: #FFFFFF;
  margin-bottom: 1rem;
}
.brand-depth h1 {
  font-size: 1.7rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #1E4A2F, #2F855A);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.brand-depth .tagline {
  font-size: 0.7rem;
  font-family: monospace;
  color: var(--green-accent);
  margin-top: 0.3rem;
}

.nav-depth {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
  margin: 1.2rem 0 1.5rem;
}
.nav-depth-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0.7rem 1rem;
  border-radius: 60px;
  font-weight: 500;
  font-size: 0.95rem;
  color: var(--text-dim);
  cursor: pointer;
  transition: var(--transition);
  background: transparent;
  border: 1px solid transparent;
}
.nav-depth-item i {
  width: 24px;
  font-size: 1.1rem;
  color: var(--green-accent);
}
.nav-depth-item:hover {
  background: rgba(47,133,90,0.15);
  border-color: rgba(47,133,90,0.35);
  color: var(--text-dark);
  transform: translateX(6px);
  backdrop-filter: blur(10px);
}
.nav-depth-item.active {
  background: rgba(47,133,90,0.25);
  border-color: var(--green-accent);
  color: var(--text-dark);
  box-shadow: 0 6px 14px rgba(47,133,90,0.15);
}

.social-depth {
  margin-top: auto;
  padding-top: 1.5rem;
  border-top: 1px solid rgba(47,133,90,0.2);
}
.social-icons {
  display: flex;
  gap: 1rem;
  margin-top: 0.8rem;
}
.social-icons a {
  color: var(--text-dim);
  font-size: 1.2rem;
  transition: 0.2s;
}
.social-icons a:hover {
  color: var(--green-accent);
  transform: translateY(-2px);
  text-shadow: 0 0 6px rgba(47,133,90,0.4);
}

/* ========= 右侧内容区：滑动翻页容器 ========= */
.content-depth {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: transparent;
}

/* 滑动页面容器 - 垂直滚动snap */
.pages-container {
  height: 100%;
  overflow-y: auto;
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
.pages-container::-webkit-scrollbar {
  width: 5px;
}
.pages-container::-webkit-scrollbar-track {
  background: rgba(60,100,70,0.1);
  border-radius: 10px;
}
.pages-container::-webkit-scrollbar-thumb {
  background: var(--green-accent);
  border-radius: 10px;
}

/* 每个独立页面占满可视区域，scroll-snap */
.page-snap {
  scroll-snap-align: start;
  min-height: 100%;
  height: auto;
  padding: 2rem 2.2rem;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}

/* 页面内卡片样式 */
.page-card {
  background: var(--glass-base);
  backdrop-filter: blur(16px);
  border: 1px solid var(--glass-edge);
  border-radius: 28px;
  padding: 1.8rem 2rem;
  transition: all 0.35s ease;
  box-shadow: 0 12px 28px -12px rgba(30, 60, 40, 0.12);
  width: 100%;
  max-width: 1200px;
  margin: 1rem auto;
  animation: fadeIn 0.4s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.page-title {
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  background: linear-gradient(135deg, #1C4D2E, #2F855A);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  display: inline-block;
}
.section-sub {
  font-size: 0.75rem;
  letter-spacing: 1px;
  color: var(--green-accent);
  border-left: 3px solid var(--green-accent);
  padding-left: 0.9rem;
  margin: 0.5rem 0 1.2rem;
}

/* 共用组件样式 */
.skill-grid-depth {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 1rem;
}
.skill-item-depth {
  background: rgba(235, 248, 235, 0.7);
  backdrop-filter: blur(4px);
  border-radius: 20px;
  padding: 1rem;
  text-align: center;
  transition: 0.25s;
  border: 1px solid rgba(47,133,90,0.15);
}
.skill-item-depth:hover {
  transform: translateY(-4px);
  background: rgba(47,133,90,0.15);
  border-color: var(--green-accent);
}
.skill-icon-depth { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
.skill-name-depth { font-weight: 700; font-size: 0.9rem; color: var(--text-dark); }
.skill-tag-depth { font-size: 0.65rem; color: var(--green-accent); font-family: monospace; }

.game-grid-depth {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 1.2rem;
}
.game-card-depth {
  background: rgba(240, 252, 240, 0.7);
  backdrop-filter: blur(8px);
  border-radius: 24px;
  padding: 1.2rem;
  text-align: center;
  transition: 0.25s;
  border: 1px solid rgba(47,133,90,0.1);
}
.game-card-depth:hover {
  transform: translateY(-6px);
  border-color: var(--green-accent);
  background: rgba(47,133,90,0.12);
}
.game-icon-depth { font-size: 2.4rem; }
.game-title-depth { font-weight: 800; margin: 0.4rem 0; color: var(--text-dark); }
.game-link-depth { color: var(--green-accent); text-decoration: none; font-size: 0.8rem; font-weight: 600; }

.stats-depth {
  display: flex;
  flex-wrap: wrap;
  gap: 1.5rem;
  margin: 1.2rem 0 0.5rem;
}
.stat-card-depth {
  background: rgba(210, 235, 210, 0.65);
  backdrop-filter: blur(4px);
  border-radius: 60px;
  padding: 0.3rem 1.2rem;
  border: 1px solid rgba(47,133,90,0.3);
}
.stat-number-depth {
  font-weight: 800;
  font-size: 1.5rem;
  background: linear-gradient(135deg, #236B48, #2F855A);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.stat-label-depth { font-size: 0.7rem; color: var(--text-dim); }

.tools-tabs-depth {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem;
  margin: 1rem 0 1.2rem;
}
.tab-depth {
  background: rgba(210, 235, 210, 0.7);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(47,133,90,0.2);
  border-radius: 40px;
  padding: 0.4rem 1.2rem;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
  color: var(--text-dark);
}
.tab-depth.active, .tab-depth:hover {
  background: var(--green-accent);
  color: white;
  border-color: transparent;
  box-shadow: 0 5px 12px rgba(47,133,90,0.25);
}
.tool-grid-depth {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 1rem;
  max-height: 400px;
  overflow-y: auto;
}
.tool-card-depth {
  background: rgba(245, 255, 245, 0.75);
  backdrop-filter: blur(4px);
  border-radius: 20px;
  padding: 1rem;
  transition: 0.2s;
  border: 1px solid rgba(47,133,90,0.12);
}
.tool-card-depth:hover {
  background: rgba(47,133,90,0.1);
  border-color: var(--green-accent);
}
.tool-top-depth { display: flex; gap: 0.7rem; align-items: center; margin-bottom: 0.3rem; }
.tool-title-depth { font-weight: 700; color: var(--text-dark); }
.tool-desc-depth { font-size: 0.7rem; color: var(--text-dim); }
.tag-group-depth { display: flex; flex-wrap: wrap; gap: 0.3rem; margin: 0.5rem 0; }
.tag-depth { background: rgba(60,100,70,0.15); padding: 0.1rem 0.5rem; border-radius: 20px; font-size: 0.65rem; color: var(--green-accent); }

.comments-wrap-depth {
  background: rgba(230, 245, 230, 0.7);
  backdrop-filter: blur(8px);
  border-radius: 28px;
  padding: 0.8rem;
  margin-top: 0.5rem;
}
.contact-depth {
  display: flex;
  flex-wrap: wrap;
  gap: 0.8rem;
  margin: 1rem 0;
}
.contact-item-depth {
  background: rgba(225, 240, 225, 0.7);
  backdrop-filter: blur(4px);
  padding: 0.5rem 1.2rem;
  border-radius: 40px;
  text-decoration: none;
  color: var(--text-dark);
  font-size: 0.8rem;
  border: 1px solid rgba(47,133,90,0.2);
  transition: 0.2s;
}
.contact-item-depth:hover {
  background: var(--green-accent);
  color: white;
  transform: translateY(-2px);
}
.footer-depth {
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 1.5rem;
  border-top: 1px solid rgba(47,133,90,0.2);
  padding-top: 1rem;
}

/* 返回顶部按钮 */
.backtotop-depth {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: rgba(210, 235, 210, 0.85);
  backdrop-filter: blur(12px);
  border: 1px solid var(--green-accent);
  width: 44px;
  height: 44px;
  border-radius: 30px;
  color: var(--green-accent);
  cursor: pointer;
  opacity: 0;
  visibility: hidden;
  transition: 0.25s;
  z-index: 99;
}
.backtotop-depth.show {
  opacity: 1;
  visibility: visible;
}
.backtotop-depth:hover {
  background: var(--green-accent);
  color: white;
  transform: translateY(-3px);
  box-shadow: 0 0 12px rgba(47,133,90,0.4);
}

/* 响应式 */
@media (max-width: 800px) {
  .depth-layout {
    flex-direction: column;
  }
  .sidebar-depth {
    width: 100%;
    flex-direction: row;
    flex-wrap: wrap;
    padding: 1rem;
    gap: 1rem;
    align-items: center;
    border-right: none;
    border-bottom: 1px solid var(--glass-edge);
  }
  .brand-depth {
    border-bottom: none;
    margin-bottom: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 0;
  }
  .avatar-depth {
    width: 48px;
    height: 48px;
    margin-bottom: 0;
  }
  .brand-depth h1 { font-size: 1.2rem; }
  .nav-depth {
    flex-direction: row;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin: 0;
  }
  .nav-depth-item {
    padding: 0.3rem 0.8rem;
    font-size: 0.7rem;
  }
  .social-depth { display: none; }
  .page-snap {
    padding: 1rem;
  }
  .page-card {
    padding: 1.2rem;
  }
  .page-title {
    font-size: 1.4rem;
  }
}
</style>
</head>

  const pagesContainer = document.getElementById('pagesContainer');

  // 构建所有页面 (scroll-snap结构)
  function buildPages() {
    pagesContainer.innerHTML = '';
    pageOrder.forEach(pageId => {
      const pageDiv = document.createElement('div');
      pageDiv.className = 'page-snap';
      pageDiv.setAttribute('data-page-id', pageId);
      pageDiv.innerHTML = pagesContent[pageId];
      pagesContainer.appendChild(pageDiv);
    });
  }
  
  // 渲染指定页面索引 (滚动到对应页)
  function scrollToPage(index, smooth = true) {
    if (index < 0 || index >= pageOrder.length) return;
    const targetPage = pagesContainer.children[index];
    if (targetPage) {
      targetPage.scrollIntoView({ behavior: smooth ? 'smooth' : 'instant', block: 'start' });
      // 更新导航高亮
      updateActiveNav(pageOrder[index]);
      currentIndex = index;
    }
  }
  
  // 更新左侧导航高亮
  function updateActiveNav(pageId) {
    navItems.forEach(item => {
      const pg = item.getAttribute('data-page');
      if (pg === pageId) {
        item.classList.add('active');
      } else {
        item.classList.remove('active');
      }
    });
  }
  
  // 监听滚动结束，根据当前可视区域页面更新索引和导航
  function handleScrollEnd() {
    if (!pagesContainer) return;
    const children = Array.from(pagesContainer.children);
    const scrollTop = pagesContainer.scrollTop;
    const containerHeight = pagesContainer.clientHeight;
    let bestIndex = 0;
    let minDistance = Infinity;
    children.forEach((child, idx) => {
      const offsetTop = child.offsetTop;
      const distance = Math.abs(scrollTop - offsetTop);
      if (distance < minDistance) {
        minDistance = distance;
        bestIndex = idx;
      }
    });
    if (bestIndex !== currentIndex) {
      currentIndex = bestIndex;
      const pageId = pageOrder[currentIndex];
      updateActiveNav(pageId);
    }
  }
  
  // 监听滚动事件 (防抖)
  function onScroll() {
    if (scrollTimeout) clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      handleScrollEnd();
    }, 150);
  }

  };
  function renderTools(cat) {
    const grid = document.getElementById('toolGridDepth');
    if (!grid) return;
    const items = toolboxMap[cat] || [];
    grid.innerHTML = items.map(tool => `
      <div class="tool-card-depth">
        <div class="tool-top-depth"><span style="font-size:1.5rem;">${tool.icon}</span><span class="tool-title-depth">${tool.title}</span></div>
        <div class="tool-desc-depth">${tool.desc}</div>
        <div class="tag-group-depth">${tool.tags.map(t => `<span class="tag-depth">${t}</span>`).join('')}</div>
        <a href="${tool.url}" target="_blank" style="color:#2F855A; font-size:0.7rem; text-decoration:none; font-weight:500;">打开 →</a>
      </div>
    `).join('');
  }
  function initToolsTab() {
    const tabs = document.querySelectorAll('#toolTabsDepth .tab-depth');
    if (tabs.length) {
      renderTools('dev');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          renderTools(tab.getAttribute('data-cat'));
        });
      });
    }
  }
  
  // 返回顶部按钮逻辑 (针对滑动容器)
  const backBtn = document.getElementById('backToTopDepth');
  function toggleBackBtn() {
    if (pagesContainer.scrollTop > 500) backBtn.classList.add('show');
    else backBtn.classList.remove('show');
  }
  pagesContainer.addEventListener('scroll', () => {
    toggleBackBtn();
    onScroll();
  });
  backBtn.addEventListener('click', () => {
    pagesContainer.scrollTo({ top: 0, behavior: 'smooth' });
  });
  
  // 启动
  init();
</script>
